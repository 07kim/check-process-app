<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ワークフロー管理・オンライン校正システム - 広報物・書類の申請から最終承認までを一元管理">
  <title>CheckFlow - ワークフロー管理システム</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="css/style.css?v=12.0">
</head>
<body>
  <!-- ============================== -->
  <!-- Login Screen -->
  <!-- ============================== -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg">
      <div class="login-bg-shape login-bg-shape-1"></div>
      <div class="login-bg-shape login-bg-shape-2"></div>
      <div class="login-bg-shape login-bg-shape-3"></div>
    </div>
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <h1 class="login-title">CheckFlow</h1>
        <p class="login-subtitle">ワークフロー管理・オンライン校正システム</p>
      </div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label" for="login-user">ログインユーザー</label>
          <select id="login-user" class="form-select">
            <!-- Populated by JS -->
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <span>ログイン</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>
        <div class="login-divider">
          <span>Phase 2: Google アカウントでログイン</span>
        </div>
        <button type="button" class="btn btn-outline btn-block" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span>Google アカウント（準備中）</span>
        </button>
        <div style="text-align:center; margin-top:16px;">
          <a href="javascript:void(0)" id="reset-data-link" style="color:var(--text-light); text-decoration:none; font-size:12px; opacity:0.6;">システムデータをリセット</a>
        </div>
      </form>
    </div>
  </div>

  <!-- ============================== -->
  <!-- App Shell -->
  <!-- ============================== -->
  <div id="app-shell" class="app-shell hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
          </div>
          <span class="sidebar-logo-text">CheckFlow</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="メニュー切替">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-title">メイン</span>
          <a href="#/dashboard" class="nav-item" data-page="dashboard">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span class="nav-label">ダッシュボード</span>
          </a>
          <a href="#/applications" class="nav-item" data-page="applications">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span class="nav-label">申請一覧</span>
            <span id="nav-badge-applications" class="nav-badge hidden">0</span>
          </a>
          <a href="#/applications/new" class="nav-item" data-page="application-new">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span class="nav-label">新規申請</span>
          </a>
          <a href="#/tasks" class="nav-item" data-page="tasks">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
            <span class="nav-label">依頼</span>
            <span id="nav-badge-tasks" class="nav-badge hidden">0</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-title">管理</span>
          <a href="#/admin" class="nav-item" data-page="admin" id="nav-admin">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span class="nav-label">分析ダッシュボード</span>
          </a>
          <a href="#/admin/users" class="nav-item" data-page="users" id="nav-users">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
            <span class="nav-label">ユーザー管理</span>
          </a>
          <a href="#/admin/settings" class="nav-item" data-page="system-settings" id="nav-system-settings">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            <span class="nav-label">システム設定</span>
          </a>
          <a href="#/settings" class="nav-item" data-page="settings">
            <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            <span class="nav-label">設定</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user">
          <div class="avatar avatar-sm" id="sidebar-avatar">U</div>
          <div class="sidebar-user-info">
            <span class="sidebar-user-name" id="sidebar-user-name">ユーザー名</span>
            <span class="sidebar-user-role" id="sidebar-user-role">ロール</span>
          </div>
        </div>
        <button id="logout-btn" class="btn-icon" title="ログアウト">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-wrapper">
      <!-- Header -->
      <header id="app-header" class="app-header">
        <div class="header-left">
          <button id="mobile-menu-btn" class="btn-icon mobile-only" aria-label="メニュー">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="header-breadcrumb" id="header-breadcrumb">
            <span class="breadcrumb-item">ダッシュボード</span>
          </div>
        </div>
        <div class="header-right">
          <div class="header-search">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="global-search" class="search-input" placeholder="案件を検索...">
          </div>
          <button id="notification-btn" class="btn-icon notification-btn" title="通知">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span id="notification-dot" class="notification-dot hidden"></span>
          </button>
      </header>

      <!-- Page Content -->
      <main id="main-content" class="main-content">
        <!-- Pages rendered here by JS -->
        <div class="page-loading">
          <div class="spinner"></div>
          <p>読み込み中...</p>
        </div>
      </main>
    </div>
  </div>

  <!-- ============================== -->
  <!-- Modal Overlay (Shared) -->
  <!-- ============================== -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="if(event.target===this) Utils.closeModal()">
    <div id="modal-container" class="modal-container"></div>
  </div>

  <!-- ============================== -->
  <!-- Toast Notifications -->
  <!-- ============================== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ============================== -->
  <!-- Scripts (dependency order) -->
  <!-- ============================== -->
  <script src="js/utils.js?v=100.0"></script>
  <script src="js/mock-data.js?v=100.0"></script>
  <script src="js/workflow-engine.js?v=100.0"></script>
  <script src="js/auth.js?v=100.0"></script>
  <script src="js/api.js?v=100.0"></script>
  <script src="js/preview.js?v=100.0"></script>
  <script src="js/components.js?v=100.0"></script>
  <script src="js/pages.js?v=100.0"></script>
  <script src="js/app.js?v=100.0"></script>
</body>
</html>
